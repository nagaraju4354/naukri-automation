name: Naukri Daily Automation

on:
  schedule:
    - cron: '30 18 * * *'   # 18:30 UTC = 12:00 AM IST every day
  workflow_dispatch:          # Allow manual trigger from GitHub UI

jobs:
  naukri-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome & ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          pip install webdriver-manager

      - name: Run Robot Framework Tests
        run: |
          robot --outputdir results naukri_login_profile.robot
        continue-on-error: true   # Don't stop — always send email even if tests fail

      - name: Send Email Report
        env:
          SENDER_EMAIL:    ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python send_report.py

      - name: Upload Results as Artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: naukri-report-${{ github.run_number }}
          path: results/
          retention-days: 30

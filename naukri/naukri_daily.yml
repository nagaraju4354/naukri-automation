name: Naukri Daily Automation

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  naukri-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Install ChromeDriver
        run: |
          pip install webdriver-manager
          python -c "from webdriver_manager.chrome import ChromeDriverManager; ChromeDriverManager().install()"

      - name: Create results directory
        run: mkdir -p results

      - name: Run Robot Framework Tests
        run: |
          robot --outputdir results naukri_login_profile.robot || true

      - name: Check results exist
        run: |
          ls -la results/ || echo "No results folder found"

      - name: Send Email Report
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python send_report.py

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: naukri-report-${{ github.run_number }}
          path: results/
          if-no-files-found: warn
          retention-days: 30

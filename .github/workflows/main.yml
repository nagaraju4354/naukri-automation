name: Naukri Daily Automation

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  naukri-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Python dependencies
        run: |
          pip install robotframework
          pip install robotframework-seleniumlibrary
          pip install selenium
          pip install webdriver-manager

      - name: Create results directory
        run: mkdir -p results

      - name: Run Robot Framework Tests
        env:
          NAUKRI_USERNAME: ${{ secrets.NAUKRI_USERNAME }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
        run: |
          robot --outputdir results naukri_login_profile.robot || true

      - name: List results
        if: always()
        run: ls -la results/ || echo "Results folder empty"

      - name: Send Email Report
        if: always()
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python send_report.py

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: naukri-report-${{ github.run_number }}
          path: results/
          if-no-files-found: warn
          retention-days: 30
